name: Fetch jobs

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '30 14 * * *'  # 8:00 PM IST
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Fetch jobs
        env:
          ADZUNA_APP_ID:     ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:    ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_jobs.py
      - name: Commit jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs $(date -u '+%Y-%m-%d %H:%M')"
          git push
